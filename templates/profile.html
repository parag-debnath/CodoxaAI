<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodoxAI — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: #ececec; padding: 32px 24px; }
    .container { max-width: 600px; margin: 0 auto; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #5b5bd6; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
    .back-btn:hover { text-decoration: underline; }
    .card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; margin-bottom: 16px; }
    .avatar-section { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: #5b5bd6; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; overflow: hidden; flex-shrink: 0; border: 3px solid rgba(91,91,214,0.4); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-info h2 { font-size: 20px; font-weight: 600; color: #fff; }
    .avatar-info p { font-size: 13px; color: #888; margin-top: 4px; }
    .stats { display: flex; gap: 16px; margin-top: 12px; }
    .stat { text-align: center; }
    .stat .num { font-size: 20px; font-weight: 700; color: #5b5bd6; }
    .stat .lbl { font-size: 11px; color: #888; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; margin-top: 16px; }
    input, textarea { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 16px; color: #ececec; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.3s, box-shadow 0.3s; }
    input:focus, textarea:focus { border-color: #5b5bd6; box-shadow: 0 0 0 3px rgba(91,91,214,0.2); }
    input::placeholder, textarea::placeholder { color: #555; }
    textarea { resize: none; height: 80px; }
    .save-btn { background: #5b5bd6; border: none; color: #fff; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 20px; transition: background 0.3s, transform 0.2s; font-family: inherit; }
    .save-btn:hover { background: #4a4ac4; transform: translateY(-1px); }
    .msg { text-align: center; font-size: 13px; margin-top: 12px; display: none; }
    .msg.success { color: #34d399; display: block; }
    .msg.error { color: #ff6b6b; display: block; }
    .avatar-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .avatar-opt { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: border-color 0.2s; }
    .avatar-opt:hover, .avatar-opt.selected { border-color: #5b5bd6; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-btn">← Back to CodoxAI</a>

    <div class="card">
      <div class="avatar-section">
        <div class="avatar" id="avatarDisplay">
          {% if profile.avatar_url %}
            {{ profile.avatar_url }}
          {% else %}
            {{ username[0].upper() }}
          {% endif %}
        </div>
        <div class="avatar-info">
          <h2 id="displayNameShow">{{ profile.display_name or username }}</h2>
          <p>{{ username }}</p>
          <div class="stats">
            <div class="stat">
              <div class="num">{{ total_chats }}</div>
              <div class="lbl">Chats</div>
            </div>
          </div>
        </div>
      </div>

      <label>Display Name</label>
      <input type="text" id="displayName" placeholder="Your name" value="{{ profile.display_name or '' }}">

      <label>Bio</label>
      <textarea id="bio" placeholder="Tell us about yourself...">{{ profile.bio or '' }}</textarea>

      <label>Choose Avatar Emoji</label>
      <div class="avatar-options">
        <div class="avatar-opt" onclick="selectAvatar('👨‍💻')">👨‍💻</div>
        <div class="avatar-opt" onclick="selectAvatar('👩‍💻')">👩‍💻</div>
        <div class="avatar-opt" onclick="selectAvatar('🤖')">🤖</div>
        <div class="avatar-opt" onclick="selectAvatar('🦊')">🦊</div>
        <div class="avatar-opt" onclick="selectAvatar('🐱')">🐱</div>
        <div class="avatar-opt" onclick="selectAvatar('🐼')">🐼</div>
        <div class="avatar-opt" onclick="selectAvatar('🦁')">🦁</div>
        <div class="avatar-opt" onclick="selectAvatar('🐸')">🐸</div>
        <div class="avatar-opt" onclick="selectAvatar('🦄')">🦄</div>
        <div class="avatar-opt" onclick="selectAvatar('⚡')">⚡</div>
        <div class="avatar-opt" onclick="selectAvatar('🔥')">🔥</div>
        <div class="avatar-opt" onclick="selectAvatar('🌙')">🌙</div>
      </div>

      <button class="save-btn" onclick="saveProfile()">Save Profile</button>
      <p class="msg" id="msg"></p>
    </div>
  </div>

  <script>
    var selectedAvatar = '{{ profile.avatar_url or "" }}';

    function selectAvatar(emoji) {
      selectedAvatar = emoji;
      document.getElementById('avatarDisplay').innerText = emoji;
      document.querySelectorAll('.avatar-opt').forEach(function(el) {
        el.classList.remove('selected');
        if (el.innerText === emoji) el.classList.add('selected');
      });
    }

    async function saveProfile() {
      var displayName = document.getElementById('displayName').value.trim();
      var bio = document.getElementById('bio').value.trim();
      var msg = document.getElementById('msg');

      var res = await fetch('/update_profile', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ display_name: displayName, bio: bio, avatar_url: selectedAvatar })
      });
      var data = await res.json();
      if (data.success) {
        msg.textContent = '✅ Profile saved successfully!';
        msg.className = 'msg success';
        document.getElementById('displayNameShow').innerText = displayName || '{{ username }}';
      } else {
        msg.textContent = '❌ Something went wrong';
        msg.className = 'msg error';
      }
    }
  </script>
</body>
</html>
