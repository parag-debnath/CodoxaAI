name: Sync Codox AI to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.name "Parag07"
          git config --global user.email "actions@github.com"

          git remote add hf https://Parag07:$HF_TOKEN@huggingface.co/spaces/Parag07/CodoxaAI

          git push hf main --force
